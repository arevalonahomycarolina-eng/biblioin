<head>

  <title>Biblioteca Moderna - Contacto</title>
  <link rel="icon" href="images/logo.svg" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="container">
    <div class="logo">
     <img src="images/logo.svg" class="logo_img">
      <a href="index.html">Biblioteca INFRAMEN</a>
    </div>
    <nav>
      <ul>
        <li>
          <img src="images/inicio.svg" class="nav-icon">
          <a href="index.html">Inicio</a>
        </li>
        <li>
          <img src="images/catalogo.svg" class="nav-icon">
          <a href="Catalogo.html">Catalogo</a>
        </li>
        <li>
          <img src="images/nosotros.svg" class="nav-icon">
          <a href="nosotros.html">Nosotros</a>
        </li>
        <li>
          <img src="images/contacto.svg" class="nav-icon">
          <a href="contacto.html">Contactanos</a>
        </li>
        <li>
          <img src="images/actividades.svg" class="nav-icon">
          <a href="actividades.html">Actividades</a>
        </li>
        <li>
          <img src="images/blog.svg" class="nav-icon">
          <a href="blog.html">Blog</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<section class="contact-form">
  <h2>Contacto</h2>
  <form>
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Correo electrónico" required>
    <textarea rows="5" placeholder="Mensaje" required></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

<section id="ubicacion">
  <h2>Ubicación</h2>
  <div class="map">
    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d62010.52671702635!2d-89.1789623!3d13.7391487!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2ssv!4v1756300370260!5m2!1ses!2ssv" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</section>

<footer>
  <p class="text">&copy; 2025 Biblioteca INFRAMEN. Todos los derechos reservados.</p>
  <p class="text2">
    <a href="#">Facebook</a> |

    <a href="#">Instagram</a>
  </p>
  <div class="logos">
      <img class ="foto" src="images/logo_face.jpg" alt="">
      <img src="images/logo_twitter.jpg" alt="">
      <img src="images/logo_ig.jpeg" alt="">

</footer>
